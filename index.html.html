// Conversation history array to maintain context
let conversationHistory = [];

// Process user query by calling the Vercel backend
async function processAIQuery() {
  const inp = document.getElementById('aiInput');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;

  appendChat('user', text);
  inp.value = '';

  // Add to history
  conversationHistory.push({ role: 'user', content: text });

  const typId = 'typ-' + Date.now();
  appendChat('bot', '<span class="typing-anim">Mike\'s Assistant is typing...</span>', typId);

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        history: conversationHistory.slice(0, -1), // send previous messages without the current one
        userContext: {} // You can pass age, gender etc. if you collect them
      })
    });

    const data = await response.json();
    const reply = data.reply || 'Sorry, I encountered an issue. Please try again.';

    // Update typing indicator with actual reply
    const el = document.getElementById(typId);
    if (el) el.innerHTML = reply;

    // Add assistant response to history
    conversationHistory.push({ role: 'assistant', content: reply });

    // Scroll to bottom
    const body = document.getElementById('aiChatBody');
    if (body) body.scrollTop = body.scrollHeight;

  } catch (error) {
    console.error('API error:', error);
    const el = document.getElementById(typId);
    if (el) el.innerHTML = '⚠️ Unable to connect. Please try again or contact Mike directly on WhatsApp.';
  }
}

// Quick reply button handler
function sendQuickReply(text) {
  const inp = document.getElementById('aiInput');
  if (inp) {
    inp.value = text;
    processAIQuery();
  }
}

// Toggle chat window
function toggleAIChat() {
  const win = document.getElementById('aiWindow');
  if (win) win.classList.toggle('open');
}

// Append message to chat window
function appendChat(sender, text, id) {
  const body = document.getElementById('aiChatBody');
  if (!body) return;
  const div = document.createElement('div');
  div.className = 'ai-msg ai-' + sender;
  if (id) div.id = id;
  div.innerHTML = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}
